<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enya Sandvold-Olsen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Albert+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="is-project">
<header class="site-header" id="header">
  <a class="wordmark" href="index.html">Enya Sandvold&#8209;Olsen</a>
  <nav class="site-nav">
    <a href="index.html">Work</a>
    <a href="about.html">Profile</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="project" id="project-root"></main>

<script src="projects.js"></script>
<script>
  const id = new URLSearchParams(location.search).get('id');
  const p = PROJECTS.find(x => x.id === id) || PROJECTS[0];
  document.title = p.title + ", Enya Sandvold-Olsen";
  const idx = PROJECTS.indexOf(p);
  const next = PROJECTS[(idx + 1) % PROJECTS.length];
  const prev = PROJECTS[(idx - 1 + PROJECTS.length) % PROJECTS.length];

  // cover first (the large lead image), then the rest as the trail
  const imgs = [p.cover, ...p.images.filter(s => s !== p.cover)];

  function imgBlock(src, lead){
    return `<figure class="pimg${lead?' lead':''}">
      <div class="img-wrap">
        <img src="images/${src}" alt="${p.title}" ${lead?'loading="eager"':'loading="lazy"'}
             onerror="this.closest('.img-wrap').classList.add('placeholder'); this.style.display='none';">
        <span class="ph-label">${src}</span>
      </div>
    </figure>`;
  }

  document.getElementById('project-root').innerHTML = `
    <div class="proj-grid">
      <div class="proj-left">
        ${imgBlock(imgs[0], true)}
        ${imgs.slice(1).map(s=>imgBlock(s,false)).join('')}
      </div>
      <aside class="proj-right">
        <div class="pr-inner">
          <div class="pr-meta"><span>${p.id}</span><span>${p.type}</span><span>${p.year}</span></div>
          <h1>${p.title}</h1>
          <p class="pr-summary">${p.summary}</p>
          <dl class="pr-spec">
            <div><dt>Program</dt><dd>${p.program}</dd></div>
            <div><dt>Type</dt><dd>${p.type}</dd></div>
            <div><dt>Location</dt><dd>${p.location}</dd></div>
            <div><dt>Year</dt><dd>${p.year}</dd></div>
          </dl>
          <nav class="pr-nav">
            <a href="project.html?id=${prev.id}">&larr; ${prev.title}</a>
            <a href="index.html">All Work</a>
            <a href="project.html?id=${next.id}">${next.title} &rarr;</a>
          </nav>
        </div>
      </aside>
    </div>`;

  const header = document.getElementById('header');
  addEventListener('scroll',()=>header.classList.toggle('scrolled', scrollY>20));
</script>
</body>
</html>
